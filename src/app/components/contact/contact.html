<div class="contact-container">
  <div class="contact-card">

    <h2>Contact Me</h2>

    <!-- Email -->
    <div class="contact-item">
      <span class="icon">📧</span>
      <a href="mailto:shreeganeshakv444@gmail.com">
        Mail me
      </a>
    </div>

    <!-- Phone -->
    <div class="contact-item" (click)="copyPhone()">
      <span class="icon">📱</span>
      <span>{{ copied ? 'Copied!' : phone }}</span>
    </div>

    <!-- LinkedIn -->
    <div class="contact-item">
      <span class="icon">💼</span>
      <a href="{{ linkedIn }}" target="_blank">
        LinkedIn
      </a>
    </div>

    <!-- GitHub -->
    <div class="contact-item">
      <span class="icon">💻</span>
      <a href="{{ github }}" target="_blank">
        GitHub
      </a>
    </div>

    <!-- Location -->
    <div class="contact-item">
      <span class="icon">📍</span>
      <a href="https://www.google.com/maps/place/Bangalore" target="_blank">
        Bangalore
      </a>
    </div>

    <!-- Resume -->
    <button class="resume-btn" (click)="viewResume()">
      View Resume
    </button>

  </div>
</div>
