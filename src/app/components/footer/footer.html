<footer class="footer">

  <div class="footer-container">

    <!-- CENTERED MAIN SECTION -->
    <div class="footer-main">

      <h2>Shreeganesha K V</h2>
      <p>Java Full Stack Developer</p>

      <!-- SOCIAL ICONS -->
      <div class="social-icons">
        <a *ngFor="let link of socialLinks"
           [href]="link.url"
           target="_blank">
          <i [class]="link.icon"></i>
        </a>
      </div>

    </div>

    <!-- QUICK LINKS -->
    <div class="footer-links">

      <h4>Quick Links</h4>

      <div class="links">
        <a *ngFor="let link of quickLinks"
           [routerLink]="link.route">
          {{link.name}}
        </a>
      </div>

    </div>

  </div>

  <!-- BOTTOM -->
  <div class="footer-bottom">

    <p>
      © {{currentYear}} Shreeganesha K V
    </p>

    <button (click)="scrollToTop()">
      ↑ Top
    </button>

  </div>

</footer>
