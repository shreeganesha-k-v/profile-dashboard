<div class="home-container">

  <!-- HERO SECTION -->

  <div class="hero">

    <div class="hero-left">

      <h1>
        Hi, I'm <span>{{name}}</span>
      </h1>

      <h3>
        {{role}} | {{tagline}}
      </h3>

      <p>
        {{description}}
      </p>

      <div class="hero-buttons">

        <button routerLink="/projects">
          View Projects
        </button>

        <button routerLink="/contact">
          Contact Me
        </button>

      </div>

    </div>

    <div class="hero-right">

      <img
        [src]="profileImage"
        alt="profile"
        (click)="openProfileDialog()"
        class="profile-img"
      />

    </div>

  </div>

  <!-- TECH STACK -->

  <div class="section">

    <h2>Core Skills</h2>

    <div class="skill-tags">

      <span *ngFor="let tech of techStack | slice:0:6">
        {{tech}}
      </span>

    </div>

    <div class="view-more" *ngIf="techStack.length > 6">
      <a class="view-more-link" routerLink="/skills">
        ... view more
      </a>
    </div>

  </div>

  <!-- ACHIEVEMENTS -->

  <div class="section">

    <h2>Highlights</h2>

    <div class="achievement-cards">

      <div
        class="card"
        *ngFor="let achievement of achievements"
      >

        <h3>
          {{achievement.title}}
        </h3>

        <p>
          {{achievement.description}}
        </p>

      </div>

    </div>

  </div>

  <!-- STATS -->

  <div class="section stats">

    <div
      class="stat-card"
      *ngFor="let stat of stats"
    >

      <h2>
        {{stat.value}}
      </h2>

      <p>
        {{stat.label}}
      </p>

    </div>

  </div>

  <!-- PROFILE PHOTO DIALOG -->

  <div class="profile-dialog" *ngIf="showProfileDialog" (click)="closeProfileDialog()">
    <div class="profile-dialog-content" (click)="$event.stopPropagation()">
      <button class="dialog-close" (click)="closeProfileDialog()" aria-label="Close">
        ✕
      </button>
      <img [src]="profileImage" alt="profile" />
    </div>
  </div>

</div>
